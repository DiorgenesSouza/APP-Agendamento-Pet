<div class="container">
  <h2>🐾 {{ idEmEdicao ? 'Editar Agendamento' : 'Novo Agendamento' }}</h2>
  
  <div class="form-agendamento">
    <input type="text" [(ngModel)]="novoAgendamento.nome_pet" placeholder="Nome do Pet" style="padding: 8px; border-radius: 4px;">
    
    <input type="text" [(ngModel)]="novoAgendamento.nome_dono" placeholder="Nome do Dono" style="padding: 8px; border-radius: 4px;">
    
    <input type="text" [(ngModel)]="novoAgendamento.tipo_servico" placeholder="Serviço (Ex: Banho)" style="padding: 8px; border-radius: 4px;">
    
    <input type="datetime-local" 
           [(ngModel)]="novoAgendamento.data_hora" 
           [min]="dataMinima"
           style="padding: 8px; border-radius: 4px;">
    
    <textarea [(ngModel)]="novoAgendamento.observacoes" 
              placeholder="Observações (Alergias, comportamento, etc.)" 
              style="padding: 10px; border-radius: 6px; width: 100%; border: 1.5px solid #d7ccc8; margin-top: 5px; outline: none;"></textarea>
    
    <div style="width: 100%; margin-top: 10px; display: flex; gap: 10px;">
      <button (click)="adicionar()" 
              class="btn-agendar"
              [style.background-color]="idEmEdicao ? '#2980b9' : '#27ae60'" 
              style="color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-weight: bold;">
        {{ idEmEdicao ? 'Salvar Alteração' : 'Agendar' }}
      </button>

      <button *ngIf="idEmEdicao" 
              (click)="limparFormulario()" 
              style="background-color: #95a5a6; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-weight: bold;">
        Cancelar
      </button>
    </div>
  </div>

  <hr style="border: 0; border-top: 1px solid #ffccbc; margin: 20px 0;">

  <h2>🗓️ Agendamentos do Dia</h2>
  
  <table class="table-pets" border="0" style="width: 100%; border-collapse: collapse; margin-top: 10px;">
    <thead>
      <tr style="color: white;">
        <th style="padding: 12px;">Pet</th>
        <th style="padding: 12px;">Dono</th>
        <th style="padding: 12px;">Serviço</th> 
        <th style="padding: 12px;">Data/Hora</th>
        <th style="padding: 12px;">Observações</th> <th style="padding: 12px;">Ações</th> 
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let a of listaAgendamentos" style="text-align: center; border-bottom: 1px solid #eee;">
        <td style="padding: 12px; font-weight: bold; color: #5d4037;">{{ a.nome_pet }}</td>
        <td style="padding: 12px;">{{ a.nome_dono }}</td>
        <td style="padding: 12px;">{{ a.tipo_servico }}</td>
        <td style="padding: 12px;">{{ a.data_hora | date: 'dd/MM/yyyy HH:mm' }}</td>
        
        <td style="padding: 12px; font-style: italic; font-size: 0.9em; color: #7f8c8d; max-width: 150px;">
          {{ a.observacoes || '-' }}
        </td>

        <td style="padding: 12px; display: flex; gap: 8px; justify-content: center;">
          <button (click)="prepararEdicao(a)" 
                  style="background-color: #f39c12; color: white; border: none; padding: 6px 14px; border-radius: 4px; cursor: pointer; font-weight: bold;">
            Editar
          </button>
          <button (click)="excluir(a.id)" 
                  style="background-color: #e74c3c; color: white; border: none; padding: 6px 14px; border-radius: 4px; cursor: pointer; font-weight: bold;">
            Excluir
          </button>
        </td>
      </tr>
    </tbody>
  </table>

  <div *ngIf="listaAgendamentos.length === 0" style="margin-top: 30px; text-align: center; color: #9e9e9e; font-style: italic;">
